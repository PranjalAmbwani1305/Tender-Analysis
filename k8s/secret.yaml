  ANTHROPIC_API_KEY: eW91ci1hbnRocm9waWMta2V5LWhlcmU=
  PINECONE_API_KEY: eW91ci1waW5lY29uZS1rZXktaGVyZQ==
  PINECONE_INDEX: YXRnZGEtdGVuZGVycw==
